name: Build and Update Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: 🌐 Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out Repo
        uses: actions/checkout@v6

      - name: ⬇️ Checkout Profile
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/.github
          ref: master
          path: profile

      - name: ⬇️ Checkout Mediaportal
        uses: actions/checkout@v6
        with:
          repository: MediaPortal/MediaPortal-1
          ref: master
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false
          path: mediaportal

      - name: 🎭 Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: 📦 Install mkDocs
        run: pip install mkdocs-material

      - name: 📦 Install mkDocs Plug-ins
        run: |
          pip install mkdocs-video
          pip install "mkdocs-material[imaging]"

      - name: 🏅 Generate Profile Page
        run: |
          SOURCE="profile/profile/README.md"
          DEST="docs/index.md"

          # 1. Flexible search: ignores case, extra spaces, and handles potential hidden characters
          # We search for '##' followed by any space and then 'Plugins'
          LINE_NR=$(grep -inE "##[[:space:]]*Plugins" "$SOURCE" | cut -d: -f1 | head -n 1)

          if [ -z "$LINE_NR" ]; then
            echo "Error: '## Plugins' section not found in $SOURCE"
            echo "Available headers in file:"
            grep "^#" "$SOURCE"
            exit 1
          fi

          echo "Success: Section found at line $LINE_NR"

          # 2. Clean and Append
          sed -i '/##[[:space:]]*Plugins/,$d' "$DEST"
          echo -e "\n" >> "$DEST"
          tail -n +"$LINE_NR" "$SOURCE" >> "$DEST"

      - name: 🐙 Mediaportal Page
        run: |
          import os
          import re

          source_path = "mediaportal/README.md"
          dest_path= "docs/mediaportal.md"

          def convert_github_alerts(text):
              mapping = {
                  "NOTE": "note",
                  "TIP": "tip",
                  "IMPORTANT": "abstract",  # info
                  "WARNING": "warning",
                  "CAUTION": "danger"       # failure
              }
          
              def replacement(match):
                  raw_type = match.group(1).upper()
                  mkdocs_type = mapping.get(raw_type, "note")
                  content = match.group(2)
                  
                  fixed_content = ""
                  for line in content.strip().split('\n'):
                      clean_line = re.sub(r'^>\s?', '', line)
                      fixed_content += f"    {clean_line}\n"
                      
                  return f"!!! {mkdocs_type}\n{fixed_content}"
          
              pattern = r'^>\s+\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]((?:\n^>.*)+)'
              return re.sub(pattern, replacement, text, flags=re.M | re.I)

          with open(source_path, "r", encoding="utf-8") as f:
              content = f.read()

          content = convert_github_alerts(content)

          with open(dest_path, "w", encoding="utf-8") as f:
              f.write(content)
        shell: python

      - name: 💅 Build the Docs site
        run: mkdocs build --config-file .mkdocs.yml

      - name: 🚀 Deploy to GitHub Pages
        run: mkdocs gh-deploy --config-file .mkdocs.yml --force
