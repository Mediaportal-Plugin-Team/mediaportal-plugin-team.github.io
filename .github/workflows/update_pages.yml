name: Build and Update Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: 🌐 Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out Repo
        uses: actions/checkout@v6

      - name: ⬇️ Checkout Profile
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/.github
          ref: master
          path: profile

      - name: 🎭 Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: 📦 Install mkDocs
        run: pip install mkdocs-material

      - name: 📦 Install mkDocs Plug-ins
        run: |
          pip install mkdocs-video
          pip install "mkdocs-material[imaging]"

      - name: 🏅 Generate Profile Page
        run: |
          # Define file paths
          SOURCE="profile/README.md"
          DEST="docs/index.md"

          # 1. Find the starting line of the Plugins section (case-insensitive)
          LINE_NR=$(grep -in "## Plugins" "$SOURCE" | cut -d: -f1 | head -n 1)

          if [ -z "$LINE_NR" ]; then
            echo "Error: '## Plugins' not found in $SOURCE"
            exit 1
          fi

          # 2. Clean up index.md: remove existing Plugins section to avoid duplication
          # This deletes everything from "## Plugins" to the end of the file
          sed -i '/## Plugins/,$d' "$DEST"

          # 3. Append the new content from SOURCE to DEST
          # Adding a couple of newlines for clean formatting
          echo -e "\n" >> "$DEST"
          tail -n +"$LINE_NR" "$SOURCE" >> "$DEST"

          # 4. Verify for the logs
          echo "Content successfully merged into $DEST"
          echo "Preview of the end of the file:"
          tail -n 10 "$DEST"

      - name: 💅 Build the Docs site
        run: mkdocs build --config-file .mkdocs.yml

      - name: 🚀 Deploy to GitHub Pages
        run: mkdocs gh-deploy --config-file .mkdocs.yml --force
